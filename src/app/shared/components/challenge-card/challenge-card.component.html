<a
      [routerLink]="challenge.route"
      class="group block bg-neutral-900 border border-neutral-800 rounded-xl p-6
             hover:border-cyan-400/50 hover:bg-neutral-800/50
             transition-all duration-300 cursor-pointer">

      <!-- Header -->
      <div class="flex items-start justify-between mb-4">
        <span [class]="difficultyClass" class="text-xs font-mono px-2 py-1 rounded-full">
          {{ challenge.difficulty }}
        </span>
        <span class="text-neutral-600 text-xs font-mono">{{ challenge.completedAt }}</span>
      </div>

      <!-- Title -->
      <h3 class="text-white font-semibold text-lg mb-2 group-hover:text-cyan-400 transition-colors duration-200">
        {{ challenge.title }}
      </h3>

      <!-- Description -->
      <p class="text-neutral-500 text-sm leading-relaxed mb-5">
        {{ challenge.description }}
      </p>

      <!-- Highlights -->
      <ul class="space-y-1 mb-5">
        @for (h of challenge.highlights; track h) {
          <li class="text-xs text-neutral-600 font-mono flex items-center gap-2">
            <span class="text-cyan-600">›</span>
            {{ h }}
          </li>
        }
      </ul>

      <!-- Tags -->
      <div class="flex flex-wrap gap-2 mb-5">
        @for (tag of challenge.tags; track tag) {
          <span class="text-xs font-mono text-neutral-500 bg-neutral-800 border border-neutral-700 px-2 py-0.5 rounded">
            {{ tag }}
          </span>
        }
      </div>

      <!-- Footer -->
      <div class="flex items-center justify-between pt-4 border-t border-neutral-800">
        <span class="text-cyan-400 text-sm font-mono group-hover:translate-x-1 transition-transform duration-200">
          View demo →
        </span>
        <a
          [href]="challenge.githubUrl"
          target="_blank"
          (click)="$event.stopPropagation()"
          class="text-neutral-600 hover:text-white text-xs font-mono transition-colors duration-200">
          GitHub ↗
        </a>
      </div>

    </a>
