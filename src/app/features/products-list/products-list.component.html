    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (product of products; track product.id) {
        <div class="group bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl overflow-hidden hover:bg-white/10 hover:border-white/20 transition-all duration-300 hover:shadow-2xl hover:shadow-indigo-500/10">

          <!-- Image -->
          <div class="h-48 bg-gradient-to-br from-indigo-500/20 to-purple-500/20 overflow-hidden">
            @if (product.image) {
              <img
                [src]="product.image"
                [alt]="product.name"
                class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                loading="lazy"
              >
            } @else {
              <div class="w-full h-full flex items-center justify-center">
                <i class="fas fa-microchip text-5xl text-indigo-400/50"></i>
              </div>
            }
          </div>

          <!-- Info -->
          <div class="p-5 space-y-3">
            <span class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold">
              {{ product.category }}
            </span>
            <h3 class="text-white font-semibold text-lg line-clamp-1">{{ product.name }}</h3>
            <p class="text-2xl font-black text-white">${{ product.price }}</p>

            <!-- Button -->
            <button
              (click)="store.addToCart(product)"
              class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-900/20 active:scale-95 transition-all flex items-center justify-center gap-2 mt-4"
            >
              <i class="fas fa-plus-circle text-sm"></i>
              Add to Cart
            </button>
          </div>
        </div>
      }
    </div>
