<div class="min-h-screen bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto">
    <!--
We use the async pipe to obtain the data from'Guillermo Moran' -->
    @if (user$ | async; as user) {
      <div class="bg-white rounded-3xl shadow-xl overflow-hidden">

        <!-- Custom Header -->
        <div class="bg-indigo-600 p-8 text-white flex justify-between items-center">
          <div>
            <h1 class="text-2xl font-bold">Welcome, {{ user.name }}!</h1>
            <p class="opacity-80">Logged in as: {{ user.email }}</p>
          </div>
          <button (click)="logout()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition-all">
            <i class="fas fa-sign-out-alt mr-2"></i> Logout
          </button>
        </div>

        <div class="p-8">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Dynamic Token Card -->
            <div class="p-6 bg-indigo-50 rounded-2xl border border-indigo-100">
              <h3 class="font-bold text-indigo-900 mb-2">Active Session Token</h3>
              <p class="text-sm text-indigo-700 font-mono break-all">
                {{ user.token }}
              </p>
            </div>

            <!-- Dynamic Role Card -->
            <div class="p-6 bg-green-50 rounded-2xl border border-green-100">
              <h3 class="font-bold text-green-900 mb-2">Account Permissions</h3>
              <div class="flex items-center gap-2">
                <span class="px-3 py-1 bg-green-200 text-green-800 rounded-full text-xs font-bold uppercase">
                  {{ user.role }}
                </span>
                <p class="text-xs text-green-700 italic">Full administrative access</p>
              </div>
            </div>

          </div>

          <!-- Additional Profile Information -->
          <div class="mt-8 pt-6 border-t border-gray-100">
            <h4 class="text-sm font-semibold text-gray-500 mb-4">Internal User Metadata</h4>
            <div class="flex gap-4">
              <div class="text-xs bg-indigo-50 px-3 py-2 rounded-lg">
                <span class="text-indigo-700 font-mono ml-1">User ID:</span>
                <span class="text-green-600 font-bold ml-1">{{ user.id }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    } @else {
       <!-- Fallback in case the guard allows passage but there is no data (rare) -->
      <div class="text-center p-12">
        <i class="fas fa-spinner animate-spin text-4xl text-indigo-600"></i>
        <p class="mt-4 text-gray-500">Loading secure profile...</p>
      </div>
    }
  </div>
</div>
