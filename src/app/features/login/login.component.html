<div class="min-h-screen bg-gray-100 p-6 flex items-center justify-center">
  <div class="max-w-md w-full mx-auto">

    <!-- Restricted Access Alert -->
    @if (hasReturnUrl) {
      <div class="mb-4 p-4 bg-amber-50 border border-amber-200 rounded-2xl flex items-center gap-3 text-amber-800 animate-bounce">
        <i class="fas fa-exclamation-circle text-xl"></i>
        <p class="text-sm font-medium">Restricted area. You must log in to access.</p>
      </div>
    }

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
      <!-- Top Header -->
      <div class="bg-indigo-600 p-8 text-white text-center">
        <div class="inline-flex p-3 bg-white/20 rounded-2xl mb-4">
          <i class="fas fa-lock text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold">Welcome back</h1>
        <p class="opacity-80 text-sm">Enter your credentials to continue</p>
      </div>

      @if (errorMessage) {
    <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-xl flex items-center gap-3 text-red-800 animate-head-shake">
      <i class="fas fa-times-circle text-xl"></i>
      <p class="text-sm font-semibold">{{ errorMessage }}</p>
    </div>
  }

      <!-- Simulation Form -->
      <div class="p-8">
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">User (Simulated)</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                <i class="fas fa-user"></i>
              </span>
              <input
                type="text"
                [(ngModel)]="credentials.email"
                placeholder="Your email"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-500 cursor-not-allowed"
              >
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                <i class="fas fa-key"></i>
              </span>
              <input
                type="password"
                [(ngModel)]="credentials.password"
                placeholder="Your password"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-500 cursor-not-allowed"
              >
            </div>
          </div>

          <button
            (click)="login()"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-200 active:scale-[0.98] cursor-pointer"
          >
            Login
          </button>
        </div>

        <!-- Informative Footer -->
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
          <p class="text-xs text-gray-400 leading-relaxed">
            This challenge demonstrates the use of <span class="text-indigo-500 font-semibold">CanActivateFn</span> and state management with <span class="text-indigo-500 font-semibold">BehaviorSubject</span>.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
